name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.22"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1b6671e713fd51c7f28eb88acf29c9bf3c2eb15f # v6.5.0
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vallexis
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vallexis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vallexis -d vallexis_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a testredispass ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        env:
          REDIS_ARGS: "--requirepass testredispass"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.22"
      - name: Run tests
        run: go test ./... -v -count=1 -race
        env:
          DATABASE_URL: postgres://vallexis:testpassword@localhost:5432/vallexis_test?sslmode=disable
          REDIS_URL: redis://:testredispass@localhost:6379/0

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, deploy-service, payment-service, seo-service]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build ${{ matrix.service }}
        run: docker build -t ${{ matrix.service }}:ci ./src/${{ matrix.service }}

  scan:
    name: Trivy Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, deploy-service, payment-service, seo-service]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build ${{ matrix.service }} for scanning
        run: docker build -t ${{ matrix.service }}:scan ./src/${{ matrix.service }}
      - name: Scan ${{ matrix.service }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.service }}:scan
          severity: CRITICAL,HIGH
          exit-code: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Deploy to production
        run: echo "Deployment placeholder — implement via SSH, OCI CLI, or deploy-service webhook"
