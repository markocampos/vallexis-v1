# =============================================================================
# Vallexis — Production Docker Compose
# Usage: docker compose up -d
# =============================================================================

x-backend-service: &backend-service
  env_file: .env
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '1.0'
  depends_on:
    postgres:
      condition: service_healthy

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

services:
  # --- Reverse Proxy ---
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api-gateway
      - deploy-service
      - payment-service
      - seo-service
    restart: unless-stopped
    networks:
      - frontend-net

  # --- Backend Services ---
  api-gateway:
    <<: *backend-service
    build:
      context: .
      dockerfile: src/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_PORT=3000
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      <<: *healthcheck-defaults
    networks:
      - default
      - backend-net
      - db-net

  deploy-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: src/deploy-service/Dockerfile
    environment:
      - DEPLOY_PORT=3001
      - DOCKER_HOST=tcp://docker-proxy:2375
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      <<: *healthcheck-defaults
    networks:
      - backend-net
      - db-net

  docker-proxy:
    image: tecnativa/docker-socket-proxy:1.2.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      EXEC: 0
      NETWORKS: 1
      SERVICES: 1
      POST: 0
      UPLOAD: 0
      VOLUMES: 0
    restart: unless-stopped

  payment-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: src/payment-service/Dockerfile
    environment:
      - PAYMENT_PORT=3002
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      <<: *healthcheck-defaults
    networks:
      - backend-net

  seo-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: src/seo-service/Dockerfile
    environment:
      - SEO_PORT=3003
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      <<: *healthcheck-defaults
    networks:
      - backend-net

  # --- Frontend ---
  react-frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped

  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - db-net
      - backend-net

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory ${REDIS_MAX_MEMORY:-256mb}
        --maxmemory-policy ${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - db-net
      - backend-net

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend-net
      - monitoring-net

  # --- Observability ---
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - monitoring-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    networks:
      - monitoring-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring-net
      - db-net

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring-net
      - db-net

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - monitoring-net

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  default:
  frontend-net:
  backend-net:
  db-net:
  monitoring-net:
