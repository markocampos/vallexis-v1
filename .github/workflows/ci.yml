name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.26"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1b6671e713fd51c7f28eb88acf29c9bf3c2eb15f # v6.5.0
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vallexis
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vallexis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vallexis -d vallexis_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a testredispass ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        env:
          REDIS_ARGS: "--requirepass testredispass"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.26"
      - name: Run tests
        run: go test ./... -v -count=1 -race
        env:
          DATABASE_URL: postgres://vallexis:testpassword@localhost:5432/vallexis_test?sslmode=disable
          REDIS_URL: redis://:testredispass@localhost:6379/0

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --frozen-lockfile
      - name: Run oxlint
        run: npm run lint

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --frozen-lockfile
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-coverage
          path: src/frontend/coverage/
          retention-days: 7

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --frozen-lockfile
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: /api/v1

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, deploy-service, payment-service, seo-service]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build ${{ matrix.service }}
        run: docker build -t ${{ matrix.service }}:ci -f src/${{ matrix.service }}/Dockerfile .

  build-frontend-image:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build frontend Docker image
        run: docker build -t frontend:ci -f src/frontend/Dockerfile src/frontend/

  scan:
    name: Trivy Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, deploy-service, payment-service, seo-service]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build ${{ matrix.service }} for scanning
        run: docker build -t ${{ matrix.service }}:scan -f src/${{ matrix.service }}/Dockerfile .
      - name: Scan ${{ matrix.service }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.service }}:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  scan-frontend:
    name: Trivy Scan Frontend
    runs-on: ubuntu-latest
    needs: build-frontend-image
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build frontend for scanning
        run: docker build -t frontend:scan -f src/frontend/Dockerfile src/frontend/
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: frontend:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  build-caddy:
    name: Build Caddy Reverse Proxy Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build Caddy image
        run: docker build -t caddy-proxy:ci -f caddy/Dockerfile caddy/

  scan-caddy:
    name: Trivy Scan Caddy
    runs-on: ubuntu-latest
    needs: build-caddy
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build Caddy for scanning
        run: docker build -t caddy-proxy:scan -f caddy/Dockerfile caddy/
      - name: Scan Caddy image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: caddy-proxy:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, scan, build-frontend-image, scan-frontend, build-caddy, scan-caddy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Deploy to production
        run: echo "Deployment placeholder — implement via SSH, OCI CLI, or deploy-service webhook"
