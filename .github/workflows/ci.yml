name: CI

on:
  pull_request:
    opened: true
    updated: true
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vallexis
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vallexis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vallexis -d vallexis_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run tests
        run: go test ./... -v -count=1 -race
        env:
          DATABASE_URL: postgres://vallexis:testpassword@localhost:5432/vallexis_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build api-gateway
        run: docker build -t api-gateway:ci ./src/api-gateway
      - name: Build deploy-service
        run: docker build -t deploy-service:ci ./src/deploy-service
      - name: Build payment-service
        run: docker build -t payment-service:ci ./src/payment-service
      - name: Build seo-service
        run: docker build -t seo-service:ci ./src/seo-service

  scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build images for scanning
        run: |
          docker build -t api-gateway:scan ./src/api-gateway
          docker build -t deploy-service:scan ./src/deploy-service
          docker build -t payment-service:scan ./src/payment-service
          docker build -t seo-service:scan ./src/seo-service
      - name: Scan api-gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api-gateway:scan
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Scan deploy-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: deploy-service:scan
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Scan payment-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: payment-service:scan
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Scan seo-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: seo-service:scan
          severity: CRITICAL,HIGH
          exit-code: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deployment placeholder — implement via SSH, OCI CLI, or deploy-service webhook"
