# =============================================================================
# Vallexis — Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# =============================================================================

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vallexis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vallexis_dev}
      POSTGRES_DB: ${POSTGRES_DB:-vallexis_db}

  redis: {}

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
